<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Monitor - BVB Stocks</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
        }
        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 2em;
        }
        .info {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 0.95em;
        }
        .loading {
            text-align: center;
            color: #667eea;
            font-size: 1.1em;
            padding: 40px;
        }
        .status-message {
            text-align: center;
            padding: 20px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 0.95em;
            line-height: 1.6;
        }
        .status-pending {
            background: #e8f4f8;
            color: #2c5aa0;
            border-left: 4px solid #2c5aa0;
        }
        .status-success {
            background: #eafaf1;
            color: #186a3b;
            border-left: 4px solid #186a3b;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        thead {
            background: #f5f5f5;
        }
        th {
            text-align: left;
            padding: 15px;
            color: #333;
            font-weight: 600;
            border-bottom: 2px solid #667eea;
        }
        td {
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
        }
        tr:hover {
            background: #f9f9f9;
        }
        .positive {
            color: #27ae60;
            font-weight: 500;
        }
        .negative {
            color: #e74c3c;
            font-weight: 500;
        }
        .neutral {
            color: #7f8c8d;
        }
        .price {
            font-weight: 600;
            color: #333;
        }
        .symbol {
            font-weight: 600;
            color: #667eea;
        }
        .last-updated {
            text-align: center;
            color: #999;
            font-size: 0.85em;
            margin-top: 20px;
        }
        .refresh-btn {
            display: block;
            margin: 20px auto;
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.95em;
            transition: background 0.3s;
        }
        .refresh-btn:hover {
            background: #764ba2;
        }
        .refresh-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📈 Market Monitor</h1>
        <p class="info">Bucharest Stock Exchange (BVB) - Real-time Stock Prices</p>
        
        <button id="refreshBtn" class="refresh-btn">🔄 Refresh Data</button>
        
        <div id="status" class="status-message status-pending" style="display: none;"></div>
        <div id="loading" class="loading">Loading stock data...</div>
        
        <table id="stockTable" style="display: none;">
            <thead>
                <tr>
                    <th>Symbol</th>
                    <th>Price (RON)</th>
                    <th>Change</th>
                    <th>Variation %</th>
                </tr>
            </thead>
            <tbody id="tableBody">
            </tbody>
        </table>
        
        <p class="last-updated">Last updated: <span id="lastUpdated">-</span></p>
    </div>

    <script>
        async function loadStockData() {
            try {
                const loading = document.getElementById('loading');
                const status = document.getElementById('status');
                const refreshBtn = document.getElementById('refreshBtn');
                
                loading.style.display = 'block';
                status.style.display = 'none';
                refreshBtn.disabled = true;

                // Load from stocks.json in the repository
                const response = await fetch('stocks.json?t=' + Date.now());
                
                if (!response.ok) {
                    // File doesn't exist yet - show pending message
                    showPendingMessage();
                    loading.style.display = 'none';
                    return;
                }
                
                const data = await response.json();
                displayStocks(data.stocks, data.timestamp);
                loading.style.display = 'none';
            } catch (err) {
                showPendingMessage();
                loading.style.display = 'none';
                console.error('Error:', err);
            } finally {
                document.getElementById('refreshBtn').disabled = false;
            }
        }

        function displayStocks(stocks, timestamp) {
            const tableBody = document.getElementById('tableBody');
            const table = document.getElementById('stockTable');
            const status = document.getElementById('status');

            tableBody.innerHTML = '';
            status.style.display = 'none';

            if (stocks.length === 0) {
                showPendingMessage();
                return;
            }

            stocks.forEach(stock => {
                const row = document.createElement('tr');
                const variation = parseFloat(stock.variation);
                const changeClass = variation > 0 ? 'positive' : variation < 0 ? 'negative' : 'neutral';
                const changeSymbol = variation > 0 ? '▲' : variation < 0 ? '▼' : '–';

                row.innerHTML = `
                    <td><span class="symbol">${stock.symbol}</span></td>
                    <td><span class="price">${parseFloat(stock.price).toFixed(2)}</span></td>
                    <td><span class="${changeClass}">${changeSymbol} ${stock.change}</span></td>
                    <td><span class="${changeClass}">${changeSymbol} ${stock.variation}%</span></td>
                `;
                tableBody.appendChild(row);
            });

            table.style.display = 'table';
            document.getElementById('lastUpdated').textContent = new Date(timestamp).toLocaleString();
            
            // Show success message
            showSuccessMessage();
        }

        function showPendingMessage() {
            const status = document.getElementById('status');
            const table = document.getElementById('stockTable');
            table.style.display = 'none';
            status.classList.remove('status-success');
            status.classList.add('status-pending');
            status.innerHTML = `
                <strong>⏳ Waiting for stock data...</strong><br>
                The scraper is running and will fetch real BVB data shortly.<br>
                This page will automatically update when data is available.
            `;
            status.style.display = 'block';
        }

        function showSuccessMessage() {
            const status = document.getElementById('status');
            status.classList.remove('status-pending');
            status.classList.add('status-success');
            status.innerHTML = `
                <strong>✓ Stock data loaded successfully</strong>
            `;
            status.style.display = 'block';
            setTimeout(() => {
                status.style.display = 'none';
            }, 3000);
        }

        // Load data when page loads
        window.addEventListener('DOMContentLoaded', loadStockData);

        // Refresh button
        document.getElementById('refreshBtn').addEventListener('click', loadStockData);

        // Auto-refresh every 5 minutes
        setInterval(loadStockData, 300000);
    </script>
</body>
</html>
